# Loki — single-binary mode for small clusters
# Receives logs from Promtail, queryable via Grafana

deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# Disable components not needed in single-binary mode
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

# No gateway needed — Promtail talks directly to the service
gateway:
  enabled: false

# Chunk cache disabled — small cluster, not worth the memory
chunksCache:
  enabled: false
resultsCache:
  enabled: false
