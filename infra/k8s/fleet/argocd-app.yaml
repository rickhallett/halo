apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: halo-fleet
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/rickhallett/halo.git
    targetRevision: feat/containerisation
    path: infra/k8s/fleet
    directory:
      recurse: false
      exclude: "{archived/*,*-secrets.yaml,*-secrets.yaml.example,kaniko-build.yaml,argocd-app.yaml,README.md}"
  destination:
    server: https://kubernetes.default.svc
    namespace: halo-fleet
  syncPolicy:
    automated:
      prune: false  # Don't auto-delete — we have secrets not in git
      selfHeal: true  # Revert manual drift
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
