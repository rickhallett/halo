apiVersion: apps/v1
kind: Deployment
metadata:
  name: halo-gateway
  namespace: halo-aura
spec:
  replicas: 1
  selector:
    matchLabels:
      app: halo-gateway
  template:
    metadata:
      labels:
        app: halo-gateway
        halo.client: aura
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: gateway
          image: ghcr.io/rickhallett/halo:v0.1.0
          args: ["gateway"]
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: config
              mountPath: /opt/data/config.yaml
              subPath: config.yaml
            - name: prompt
              mountPath: /opt/data/system-prompt.md
              subPath: system-prompt.md
            - name: secrets
              mountPath: /opt/data/.env
              subPath: .env
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          startupProbe:
            exec:
              command: ["python3", "-c", "import os; exit(0 if os.path.exists('/opt/data/heartbeat') else 1)"]
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            exec:
              command: ["python3", "-c", "import os,time; f='/opt/data/heartbeat'; exit(0 if os.path.exists(f) and time.time()-os.path.getmtime(f)<120 else 1)"]
            periodSeconds: 60
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: halo-data
        - name: config
          configMap:
            name: halo-config
        - name: prompt
          configMap:
            name: halo-prompt
        - name: secrets
          secret:
            secretName: halo-secrets
            defaultMode: 0400
